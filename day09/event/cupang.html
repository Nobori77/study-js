<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="https://login.coupang.com/favicon.ico" type="image/x-icon">
  <title>회원가입</title>
</head>
<body>
  <form action="#제출완료">
    <div>
      <img src="https://static.coupangcdn.com/image/static/login/logo-coupang.x2.20201201.png" alt="쿠팡 로고">
    </div>
    <div>
      <strong>회원정보를 입력해주세요</strong>
    </div>
    <div>
      <div>
        <img src="" alt=""><input type="text" id="id" placeholder="아이디(이메일)"><span id="id-result"></span>
      </div>
      <div>
        <img src="" alt=""><input type="password" id="password" placeholder="비밀번호"><span id="password-result"></span>
      </div>
      <div>
        <img src="" alt=""><input type="password" id="re-password" placeholder="비밀번호 확인"><span id="repassword-result"></span>
      </div>
      <div>
        <img src="" alt=""><input type="text" id="name" placeholder="이름"><span id="name-result"></span>
      </div>
      <div>
        <img src="" alt=""><input type="text" id="number" placeholder="휴대폰번호"><span id="number-result"></span>
      </div>
      <hr>
      <div>
        <div>
          <input type="checkbox" name="all" class="all" /><span><strong>모두 확인하였으며 동의합니다.</strong></span>
        </div> 
        <div>
          <p>전체 동의에는 필수 및 선택 정보에 대한 동의가 포함되어 있으며, 개별적으로 동의를 선택 하실 수 있습니다. 선택 항목에 대한 동의를 거부하시는 경우에도 서비스 이용이 가능합니다.</p>
        </div>
        <fieldset>
          <ul>
            <li>
              <label><input type="checkbox" name="term1" class="term" /><span>[필수] 만 14세 이상입니다</span></label>
            </li>
            <li>
              <label><input type="checkbox" name="term2" class="term"/><span>[필수] 쿠팡 이용약관 동의</span></label>
            </li>
            <li>
              <label><input type="checkbox" name="term3" class="term"/><span>[필수] 전자금융거래 이용약관 동의</span></label>
            </li>
            <li>
              <label><input type="checkbox"name="term4" class="term" /><span>[필수] 개인정보 수집 및 이용 동의</span></label>
            </li>
            <li>
              <label><input type="checkbox" name="term5" class="term"/><span>[필수] 개인정보 제3자 제공 동의</span></label>
            </li>
            <li>
              <label><input type="checkbox" name="term6" class="term"/><span>[선택] 마케팅 목적의 개인정보 수집 및 이용 동의</span></label>
            </li>
            <li>
              <label><input type="checkbox" name="term7" class="term"/><span>[선택] 광고성 정보 수신 동의</span></label>
            </li>
            <li>
              <ul>
                <li>
                  <label><input type="checkbox" name="term8" class="term"/><span>[선택] 이메일 수신 동의</span></label>
                </li>
                <li>
                  <label><input type="checkbox" name="term9" class="term"/><span>[선택] SMS, SNS 수신 동의</span></label>
                </li>
                <li>
                  <label><input type="checkbox" name="term10" class="term"/><span>[선택] 앱 푸시 수신 동의</span></label>
                </li>
              </ul>
            </li>
          </ul>
        </fieldset>
      </div>
    </div>
    <button type="button">동의하고 가입하기</button>
  </form>
</body>
<script>
  // 유효성 검사 및 체크박스 전체 동의 로직 완성시키기.
  NodeList.prototype.map = Array.prototype.map
  const form = document.querySelector("form")
  const button = document.querySelector("button[type='button']");
  const id = document.querySelector("#id");
  const idResult = document.querySelector("#id-result");
  const password = document.querySelector("#password");
  const passwordResult = document.querySelector("#password-result");
  const rePassword = document.querySelector("#re-password")
  const rePasswordResult = document.querySelector("#repassword-result")
  const name = document.querySelector("#name")
  const nameResult = document.querySelector("#name-result")
  const number = document.querySelector("#number")
  const numberResult = document.querySelector("#number-result")
  const all = document.querySelector("input.all")
  const terms = document.querySelectorAll("input.term")

  button.addEventListener("click", (e) => {
  if(!id.value){
    idResult.innerText = "아이디를 입력하세요";
    idResult.style.color = "red";
    idResult.style.fontSize = "10px";
    return;
  }
    idResult.innerText = " ";

  if(!password.value){
    passwordResult.innerText = "비밀번호를 입력하세요";
    passwordResult.style.color = "red";
    passwordResult.style.fontSize = "10px";
    return;
  }
    passwordResult.innerText = " ";

  if(rePassword.value !== password.value){
    rePasswordResult.innerText = "비밀번호가 맞지 않습니다 다시 확인해주세요";
    rePasswordResult.style.color = "red";
    rePasswordResult.style.fontSize = "10px";
    return;
  }
    rePasswordResult.innerText = "비밀번호가 일치합니다";
    rePasswordResult.style.color = "green";
    rePasswordResult.style.fontSize = "10px";

  if(!name.value){
    nameResult.innerText = "이름을 입력하세요";
    nameResult.style.color = "red";
    nameResult.style.fontSize = "10px";
    return;
  }
    nameResult.innerText = " ";

  if(!number.value){
    numberResult.innerText = "번호를 입력하세요";
    numberResult.style.color = "red";
    numberResult.style.fontSize = "10px";
    return;
  }
    numberResult.innerText = " ";
  
    form.submit()
  
})
  all.addEventListener("click", (e) => {
    terms.forEach((term) => {
      term.checked = all.checked
    })
  })

  terms.forEach((term) => {
    term.addEventListener("click", (e) => {
      all.checked = terms.map((term) => term.checked).filter((check) => check).length === 10;
    })
  })

</script>
</html>
